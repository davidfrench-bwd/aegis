<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Foundations - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
        }
        
        .metric-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .metric-value {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }
        
        .last-updated {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.9;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 Natural Foundations Dashboard</h1>
        
        <div id="dashboard"></div>
        
        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('../cache/natural-foundations-analytics-cache.json');
                const data = await response.json();
                
                const dashboard = document.getElementById('dashboard');
                const metrics = [
                    { label: 'Quiz Leads', value: data.totals.quizLeads },
                    { label: 'Exams', value: data.totals.exams },
                    { label: 'Commits', value: data.totals.commits },
                    { label: 'Exam Rate', value: ((data.totals.exams / data.totals.quizLeads) * 100).toFixed(1) + '%' },
                    { label: 'Commit Rate', value: ((data.totals.commits / data.totals.quizLeads) * 100).toFixed(1) + '%' }
                ];
                
                dashboard.innerHTML = `
                    <div class="metrics-grid">
                        ${metrics.map(m => `
                            <div class="metric-card">
                                <div class="metric-label">${m.label}</div>
                                <div class="metric-value">${m.value.toLocaleString()}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                document.getElementById('lastUpdated').textContent = 
                    `Last updated: ${new Date(data.lastUpdated).toLocaleString()}`;
                    
            } catch (error) {
                document.getElementById('dashboard').innerHTML = `
                    <div class="error">
                        <h2>Error loading dashboard</h2>
                        <p>Please run: npx tsx scripts/fetch-natural-foundations-ghl-data.ts</p>
                    </div>
                `;
            }
        }
        
        loadDashboard();
        
        // Auto-refresh every 5 minutes
        setInterval(loadDashboard, 5 * 60 * 1000);
    </script>
</body>
</html>
