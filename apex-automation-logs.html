<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Pain Solutions — Automation Logs</title>
    <link rel="stylesheet" href="/dashboard/style.css">
    <style>
        .logs-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .date-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px;
            background: #1a1f3a;
            border: 1px solid #334155;
            border-radius: 8px;
        }

        .date-selector label {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .date-selector input {
            padding: 8px 12px;
            background: #0a0e27;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-family: inherit;
        }

        .date-selector button {
            padding: 8px 16px;
            background: #00d9ff;
            color: #0a0e27;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .date-selector button:hover {
            background: #00b8d9;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: #1a1f3a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .stat-value.success {
            color: #10b981;
        }

        .stat-value.error {
            color: #ef4444;
        }

        .log-entry {
            background: #1a1f3a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .log-entry:hover {
            border-color: #00d9ff;
        }

        .log-entry.triggered {
            border-left: 4px solid #10b981;
        }

        .log-entry.error {
            border-left: 4px solid #ef4444;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .log-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .log-timestamp {
            font-size: 0.875rem;
            color: #64748b;
            font-family: 'Courier New', monospace;
        }

        .log-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .log-status.triggered {
            background: #10b981;
            color: #0a0e27;
        }

        .log-status.not-triggered {
            background: #64748b;
            color: #e2e8f0;
        }

        .log-status.error {
            background: #ef4444;
            color: white;
        }

        .log-details {
            display: grid;
            gap: 8px;
            font-size: 0.875rem;
        }

        .detail-row {
            display: flex;
            gap: 12px;
        }

        .detail-label {
            color: #94a3b8;
            min-width: 120px;
        }

        .detail-value {
            color: #e2e8f0;
            font-weight: 600;
        }

        .budget-changes {
            margin-top: 12px;
            padding: 12px;
            background: #0a0e27;
            border-radius: 6px;
        }

        .budget-changes-title {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .budget-change-item {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            font-size: 0.875rem;
        }

        .budget-change-item:last-child {
            border-bottom: none;
        }

        .ad-set-name {
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .budget-change-amounts {
            display: flex;
            gap: 16px;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
        }

        .budget-old {
            color: #94a3b8;
        }

        .budget-new {
            color: #10b981;
            font-weight: 700;
        }

        .budget-increase {
            color: #00d9ff;
        }

        .no-logs {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .no-logs-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .error-message {
            background: #ef4444;
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 APEX AUTOMATION LOGS</h1>
            <p class="subtitle">Activity History • Performance Tracking</p>
            <nav class="main-nav">
                <a href="/apex-automation-rules.html" class="nav-link">← Back to Rules</a>
                <a href="/apex-analytics.html" class="nav-link">📈 Analytics</a>
                <a href="/clinic-cards.html" class="nav-link">🏥 Clinics</a>
            </nav>
        </header>

        <div class="logs-container">
            <!-- Date Selector -->
            <div class="date-selector">
                <label>Select Date:</label>
                <input type="date" id="dateInput" />
                <button onclick="loadLogs()">Load Logs</button>
                <button onclick="loadToday()">Today</button>
                <button onclick="loadYesterday()">Yesterday</button>
            </div>

            <!-- Stats Summary -->
            <div class="stats-summary" id="statsSummary" style="display: none;">
                <div class="stat-box">
                    <div class="stat-label">Total Checks</div>
                    <div class="stat-value" id="totalChecks">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Triggered</div>
                    <div class="stat-value success" id="totalTriggered">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Ad Sets Affected</div>
                    <div class="stat-value" id="totalAdSets">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Budget Change</div>
                    <div class="stat-value success" id="totalBudgetChange">$0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Errors</div>
                    <div class="stat-value error" id="totalErrors">0</div>
                </div>
            </div>

            <!-- Error Display -->
            <div id="errorDisplay"></div>

            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <div>⏳ Loading logs...</div>
            </div>

            <!-- Logs List -->
            <div id="logsList"></div>
        </div>
    </div>

    <script>
        // Set today's date as default
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;

        function loadToday() {
            document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            loadLogs();
        }

        function loadYesterday() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            document.getElementById('dateInput').value = yesterday.toISOString().split('T')[0];
            loadLogs();
        }

        async function loadLogs() {
            const date = document.getElementById('dateInput').value;
            const loadingState = document.getElementById('loadingState');
            const logsList = document.getElementById('logsList');
            const errorDisplay = document.getElementById('errorDisplay');
            const statsSummary = document.getElementById('statsSummary');

            // Show loading
            loadingState.style.display = 'block';
            logsList.innerHTML = '';
            errorDisplay.innerHTML = '';
            statsSummary.style.display = 'none';

            try {
                // Query Supabase for logs on this date
                const startOfDay = `${date}T00:00:00`;
                const endOfDay = `${date}T23:59:59`;
                
                const { data: logs, error } = await supabase
                    .from('automation_logs')
                    .select('*')
                    .gte('timestamp', startOfDay)
                    .lte('timestamp', endOfDay)
                    .eq('clinic_id', 'apex-pain-solutions')
                    .order('timestamp', { ascending: false });
                
                if (error) {
                    throw new Error(error.message);
                }
                
                if (!logs || logs.length === 0) {
                    loadingState.style.display = 'none';
                    logsList.innerHTML = `
                        <div class="no-logs">
                            <div class="no-logs-icon">📭</div>
                            <div>No automation logs found for ${date}</div>
                            <div style="margin-top: 8px; font-size: 0.875rem;">
                                Try selecting a different date or run the automation.
                            </div>
                        </div>
                    `;
                    return;
                }
                
                loadingState.style.display = 'none';

                if (!logs || logs.length === 0) {
                    logsList.innerHTML = `
                        <div class="no-logs">
                            <div class="no-logs-icon">📭</div>
                            <div>No automation logs found for ${date}</div>
                        </div>
                    `;
                    return;
                }

                // Calculate stats
                const stats = {
                    totalChecks: logs.length,
                    totalTriggered: logs.filter(l => l.triggered).length,
                    totalAdSets: logs.reduce((sum, l) => sum + (l.adSetsAffected || 0), 0),
                    totalBudgetChange: logs.reduce((sum, l) => {
                        if (l.budgetChanges) {
                            return sum + l.budgetChanges.reduce((s, c) => s + c.changeAmount, 0);
                        }
                        return sum;
                    }, 0),
                    totalErrors: logs.filter(l => l.error).length
                };

                // Display stats
                statsSummary.style.display = 'grid';
                document.getElementById('totalChecks').textContent = stats.totalChecks;
                document.getElementById('totalTriggered').textContent = stats.totalTriggered;
                document.getElementById('totalAdSets').textContent = stats.totalAdSets;
                document.getElementById('totalBudgetChange').textContent = `$${(stats.totalBudgetChange / 100).toFixed(2)}`;
                document.getElementById('totalErrors').textContent = stats.totalErrors;

                // Display logs
                logsList.innerHTML = logs.map(log => renderLogEntry(log)).join('');

            } catch (error) {
                loadingState.style.display = 'none';
                errorDisplay.innerHTML = `
                    <div class="error-message">
                        <strong>Error loading logs:</strong> ${error.message}
                        <br><br>
                        <small>Make sure the API server is running on port 3456.</small>
                    </div>
                `;
                console.error('Failed to load logs:', error);
            }
        }

        function renderLogEntry(log) {
            const timestamp = new Date(log.timestamp).toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            const statusClass = log.error ? 'error' : (log.triggered ? 'triggered' : 'not-triggered');
            const statusIcon = log.error ? '✗' : (log.triggered ? '✓' : '○');
            const statusText = log.error ? 'Error' : (log.triggered ? 'Triggered' : 'Not Triggered');

            let budgetChangesHtml = '';
            if (log.budgetChanges && log.budgetChanges.length > 0) {
                budgetChangesHtml = `
                    <div class="budget-changes">
                        <div class="budget-changes-title">Budget Changes</div>
                        ${log.budgetChanges.map(change => `
                            <div class="budget-change-item">
                                <div class="ad-set-name">${change.adSetName}</div>
                                <div class="budget-change-amounts">
                                    <span class="budget-old">$${(change.oldBudget / 100).toFixed(2)}</span>
                                    <span>→</span>
                                    <span class="budget-new">$${(change.newBudget / 100).toFixed(2)}</span>
                                    <span class="budget-increase">(+${change.changePercentage.toFixed(1)}%)</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            return `
                <div class="log-entry ${statusClass}">
                    <div class="log-header">
                        <div>
                            <div class="log-title">${log.ruleName}</div>
                            <div class="log-timestamp">${timestamp}</div>
                        </div>
                    </div>
                    
                    <div class="log-status ${statusClass}">
                        <span>${statusIcon}</span>
                        <span>${statusText}</span>
                    </div>

                    <div class="log-details">
                        <div class="detail-row">
                            <span class="detail-label">Clinic:</span>
                            <span class="detail-value">${log.clinicName}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Rule ID:</span>
                            <span class="detail-value">${log.ruleId}</span>
                        </div>
                        ${log.action ? `
                            <div class="detail-row">
                                <span class="detail-label">Action:</span>
                                <span class="detail-value">${log.action}</span>
                            </div>
                        ` : ''}
                        ${log.adSetsAffected ? `
                            <div class="detail-row">
                                <span class="detail-label">Ad Sets Affected:</span>
                                <span class="detail-value">${log.adSetsAffected}</span>
                            </div>
                        ` : ''}
                        ${log.error ? `
                            <div class="detail-row">
                                <span class="detail-label">Error:</span>
                                <span class="detail-value" style="color: #ef4444;">${log.error}</span>
                            </div>
                        ` : ''}
                    </div>

                    ${budgetChangesHtml}
                </div>
            `;
        }

        // Auto-load today's logs on page load
        window.addEventListener('DOMContentLoaded', loadToday);
    </script>

</body>
</html>
