<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Control Panel - NPE Automation</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 30px;
            border-bottom: 2px solid #1e2749;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8b92a7;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #131937;
            border: 1px solid #1e2749;
            border-radius: 12px;
            padding: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .badge-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        .badge-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e2749;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #8b92a7;
            font-size: 14px;
        }
        
        .stat-value {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }
        
        .automation-rule {
            background: #0f1429;
            border: 1px solid #1e2749;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .rule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .rule-name {
            font-weight: 600;
            color: #fff;
        }
        
        .rule-details {
            font-size: 12px;
            color: #8b92a7;
            margin-top: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b92a7;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .refresh-btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .refresh-btn:hover {
            background: #2563eb;
        }
        
        .token-cost {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .progress-bar {
            background: #1e2749;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8b92a7;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Aegis Control Panel</h1>
            <div class="subtitle">NPE Automation Dashboard • Last updated: <span id="lastUpdate">Loading...</span></div>
            <div class="nav" style="margin-top: 10px;"><a href="/" style="color: #3b82f6; text-decoration: none;">← Back to Aegis Home</a></div>
        </header>
        
        <div id="errorContainer"></div>
        
        <!-- System Health -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">System Health</div>
                    <span class="badge badge-success" id="systemStatus">●  Checking...</span>
                </div>
                <div id="systemHealth">
                    <div class="loading">Loading...</div>
                </div>
            </div>
            
            <!-- Token Costs -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Token Costs</div>
                    <button class="refresh-btn" onclick="loadData()">Refresh</button>
                </div>
                <div id="tokenCosts">
                    <div class="loading">Loading...</div>
                </div>
            </div>
            
            <!-- Active Automations -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Active Automations</div>
                    <a href="/manage-rules.html" class="refresh-btn" style="text-decoration: none;">Manage Rules</a>
                    <span class="badge badge-success" id="automationCount">0 rules</span>
                </div>
                <div id="activeAutomations">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
        
        <!-- Recent Activity -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">Recent Automation Activity (Last 24h)</div>
            </div>
            <div id="recentActivity">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Supabase config (will be loaded from .env.local in production)
        const SUPABASE_URL = 'https://fbmsmqukiogxeclmgvim.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXNtcXVraW9neGVjbG1ndmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjQyODAsImV4cCI6MjA4ODE0MDI4MH0.TUmewpYEt_oYsamQpGijPYVSyk_i3gg5uS8LBUwB-0s';
        
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function loadData() {
            const now = new Date().toLocaleString();
            document.getElementById('lastUpdate').textContent = now;
            
            try {
                await Promise.all([
                    loadSystemHealth(),
                    loadTokenCosts(),
                    loadActiveAutomations(),
                    loadRecentActivity()
                ]);
                
                document.getElementById('systemStatus').textContent = '●  All Systems OK';
                document.getElementById('systemStatus').className = 'badge badge-success';
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to load data: ' + error.message);
                document.getElementById('systemStatus').textContent = '●  Error';
                document.getElementById('systemStatus').className = 'badge badge-error';
            }
        }
        
        async function loadSystemHealth() {
            // Get last execution time per clinic
            const { data: executions, error } = await sbClient
                .from('rule_executions')
                .select('clinic_id, created_at, status')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            // Group by clinic and get most recent
            const clinicMap = new Map();
            executions?.forEach(exec => {
                if (!clinicMap.has(exec.clinic_id)) {
                    clinicMap.set(exec.clinic_id, exec);
                }
            });
            
            const html = clinicMap.size > 0
                ? Array.from(clinicMap.values()).map(s => {
                    const lastRun = new Date(s.created_at).toLocaleString();
                    const status = s.status === 'success' ? 'success' : 'error';
                    return `
                        <div class="stat-row">
                            <span class="stat-label">${s.clinic_id}</span>
                            <span class="stat-value">
                                <span class="badge badge-${status}">${s.status.toUpperCase()}</span>
                                Last run: ${lastRun}
                            </span>
                        </div>
                    `;
                }).join('')
                : '<div class="empty-state">No automation runs yet</div>';
            
            document.getElementById('systemHealth').innerHTML = html;
        }
        
        async function loadTokenCosts() {
            // For now, show placeholder - will implement real tracking
            const monthlyBudget = 1000;
            const currentSpend = 320; // Will be fetched from token_costs table
            const percentage = (currentSpend / monthlyBudget) * 100;
            
            const html = `
                <div class="token-cost">$${currentSpend.toFixed(2)}</div>
                <div class="stat-label">of $${monthlyBudget}/mo budget</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${percentage}%"></div>
                </div>
                <div class="stat-row" style="margin-top: 15px; border-top: 1px solid #1e2749; padding-top: 15px;">
                    <span class="stat-label">Today</span>
                    <span class="stat-value">$15.50</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">This Week</span>
                    <span class="stat-value">$105.00</span>
                </div>
            `;
            
            document.getElementById('tokenCosts').innerHTML = html;
        }
        
        async function loadActiveAutomations() {
            const { data: rules, error } = await sbClient
                .from('automation_rules')
                .select('*')
                .eq('is_active', true);
            
            if (error) throw error;
            
            document.getElementById('automationCount').textContent = `${rules?.length || 0} rules`;
            
            const html = rules && rules.length > 0
                ? rules.map(r => `
                    <div class="automation-rule">
                        <div class="rule-header">
                            <div class="rule-name">${r.name}</div>
                            <span class="badge badge-success">Active</span>
                        </div>
                        ${r.description ? `<div class="rule-details" style="margin-bottom: 8px; color: #e0e6ed;">${r.description}</div>` : ''}
                        <div class="rule-details">
                            ${r.clinic_id} • ${r.trigger_type} (threshold: ${r.threshold}) → ${r.action_type} ${r.percentage_change}%
                        </div>
                    </div>
                `).join('')
                : '<div class="empty-state">No active automation rules</div>';
            
            document.getElementById('activeAutomations').innerHTML = html;
        }
        
        async function loadRecentActivity() {
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            
            const { data: executions, error } = await sbClient
                .from('rule_executions')
                .select(`
                    *,
                    automation_rules!inner(name, clinic_id)
                `)
                .gte('created_at', oneDayAgo)
                .order('created_at', { ascending: false })
                .limit(20);
            
            if (error) {
                console.error('Error loading recent activity:', error);
                document.getElementById('recentActivity').innerHTML = 
                    '<div class="empty-state">No automation activity in last 24 hours</div>';
                return;
            }
            
            const html = executions && executions.length > 0
                ? executions.map(exec => {
                    const time = new Date(exec.created_at).toLocaleString();
                    const statusBadge = exec.triggered 
                        ? `<span class="badge badge-warning">🔥 Budget Increased</span>`
                        : '<span class="badge">○ No action needed</span>';
                    
                    const budgetInfo = exec.triggered 
                        ? `<div class="stat-label">$${exec.old_budget} → $${exec.new_budget}</div>`
                        : exec.reason 
                        ? `<div class="stat-label">${exec.reason}</div>`
                        : '';
                    
                    return `
                        <div class="stat-row">
                            <div>
                                <div class="stat-value">${exec.automation_rules.clinic_id} - ${exec.automation_rules.name}</div>
                                <div class="stat-label">${time}</div>
                                ${budgetInfo}
                            </div>
                            <div>${statusBadge}</div>
                        </div>
                    `;
                }).join('')
                : '<div class="empty-state">No automation activity in last 24 hours</div>';
            
            document.getElementById('recentActivity').innerHTML = html;
        }
        
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error">⚠️ ${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 5000);
        }
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
        
        // Initial load
        loadData();
    </script>
</body>
</html>
