<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Login</title>
    <link rel="stylesheet" href="/dashboard/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e27;
        }
        
        .login-card {
            background: #1a1f3a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #00d9ff;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            color: #e2e8f0;
            font-size: 0.875rem;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background: #0a0e27;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .login-button {
            width: 100%;
            padding: 12px;
            background: #00d9ff;
            border: none;
            border-radius: 8px;
            color: #0a0e27;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-button:hover {
            background: #00c4e6;
            transform: translateY(-1px);
        }
        
        .login-button:disabled {
            background: #334155;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #991b1b;
            color: #fecaca;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.875rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🛡️ AEGIS</h1>
                <p>Strategic Life Operator Dashboard</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="aegis@davidfrench.io"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-button" id="loginButton">
                    Sign In
                </button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const errorMessage = document.getElementById('errorMessage');
        
        // Check if already logged in
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = '/';
            }
        })();
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Clear previous error
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
            
            // Disable button
            loginButton.disabled = true;
            loginButton.textContent = 'Signing in...';
            
            try {
                await signIn(email, password);
                
                // Get user profile to determine redirect
                const user = await getCurrentUser();
                const profile = await getUserProfile(user.id);
                
                // Redirect based on role
                if (profile.role === 'admin') {
                    window.location.href = '/';
                } else if (profile.clinic_access && profile.clinic_access.length > 0) {
                    // Redirect to first accessible clinic
                    const clinicId = profile.clinic_access[0];
                    if (clinicId === 'apex') {
                        window.location.href = '/apex-analytics.html';
                    } else if (clinicId === 'advanced-shockwave') {
                        window.location.href = '/analytics.html';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = error.message || 'Invalid email or password';
                errorMessage.classList.add('show');
                
                loginButton.disabled = false;
                loginButton.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
