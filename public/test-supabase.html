<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <div id="output"></div>
    
    <script>
        const SUPABASE_URL = 'https://fbmsmqukiogxeclmgvim.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXNtcXVraW9neGVjbG1ndmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjQyODAsImV4cCI6MjA4ODE0MDI4MH0.TUmewpYEt_oYsamQpGijPYVSyk_i3gg5uS8LBUwB-0s';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const output = document.getElementById('output');
        
        async function test() {
            output.innerHTML = '<p>Testing connection...</p>';
            
            try {
                const { data, error, count } = await supabase
                    .from('automation_rules')
                    .select('*', { count: 'exact' });
                
                if (error) {
                    output.innerHTML += `<p style="color: red;">Error: ${error.message}</p>`;
                    output.innerHTML += `<p>Error details: ${JSON.stringify(error, null, 2)}</p>`;
                } else {
                    output.innerHTML += `<p style="color: green;">Success! Found ${data.length} rules</p>`;
                    output.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (err) {
                output.innerHTML += `<p style="color: red;">Exception: ${err.message}</p>`;
            }
        }
        
        test();
    </script>
</body>
</html>
