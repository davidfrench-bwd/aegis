<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aegis Agent Communication Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #e0e0e0;
        }
        #agent-chat-container {
            display: flex;
            height: 100vh;
        }
        #agent-chat-room-list {
            width: 250px;
            background-color: #16213e;
            padding: 10px;
            overflow-y: auto;
        }
        #agent-chat-room-list .agent-chat-room {
            cursor: pointer;
            padding: 10px;
            border-bottom: 1px solid #0f3460;
            transition: background-color 0.3s;
        }
        #agent-chat-room-list .agent-chat-room:hover {
            background-color: #0f3460;
        }
        #agent-chat-messages-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        #agent-chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #0f3460;
        }
        .agent-chat-message {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #16213e;
            border-radius: 5px;
        }
        .agent-message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #e94560;
        }
        .message-type {
            color: #6b5b95;
            margin: 0 10px;
        }
        .timestamp {
            color: #6b5b95;
            font-size: 0.8em;
        }
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #e0e0e0;
        }
        #agent-chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #16213e;
        }
        #agent-chat-message-input {
            flex-grow: 1;
            margin-right: 10px;
            background-color: #0f3460;
            color: #e0e0e0;
            border: none;
            padding: 10px;
        }
        #agent-message-type {
            background-color: #0f3460;
            color: #e0e0e0;
            border: none;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="agent-chat-container">
        <div id="agent-chat-room-list">
            <!-- Agent rooms will be dynamically populated -->
        </div>
        <div id="agent-chat-messages-panel">
            <div id="agent-chat-messages">
                <!-- Agent messages will be dynamically populated -->
            </div>
            <div id="agent-chat-input-area">
                <select id="agent-message-type">
                    <option value="text">Text</option>
                    <option value="task_update">Task Update</option>
                    <option value="system_alert">System Alert</option>
                    <option value="error_report">Error Report</option>
                    <option value="diagnostic">Diagnostic</option>
                    <option value="coordination">Coordination</option>
                </select>
                <input 
                    type="text" 
                    id="agent-chat-message-input" 
                    placeholder="Send a message to your agents..."
                >
                <button id="agent-chat-send-button">Send</button>
            </div>
        </div>
    </div>

    <script src="js/agent-chat.js"></script>
</body>
</html>
