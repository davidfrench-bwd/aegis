<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aegis Dashboard Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #chat-container {
            display: flex;
            height: 100vh;
        }
        #chat-room-list {
            width: 250px;
            background-color: #f0f0f0;
            padding: 10px;
            overflow-y: auto;
        }
        #chat-room-list .chat-room {
            cursor: pointer;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        #chat-room-list .chat-room:hover {
            background-color: #e0e0e0;
        }
        #chat-messages-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #fff;
        }
        #chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
        }
        #chat-message-input {
            flex-grow: 1;
            margin-right: 10px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-room-list">
            <!-- Rooms will be dynamically populated -->
        </div>
        <div id="chat-messages-panel">
            <div id="chat-messages">
                <!-- Messages will be dynamically populated -->
            </div>
            <div id="chat-input-area">
                <input 
                    type="text" 
                    id="chat-message-input" 
                    placeholder="Type a message..."
                >
                <button id="chat-send-button">Send</button>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
