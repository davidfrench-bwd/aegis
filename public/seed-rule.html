<!DOCTYPE html>
<html>
<head>
    <title>Seed Automation Rule</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
</head>
<body>
    <h1>Seed Quiz Lead Boost Rule</h1>
    <button onclick="seedRule()">Seed Rule to Supabase</button>
    <pre id="output"></pre>

    <script>
        async function seedRule() {
            const output = document.getElementById('output');
            output.textContent = 'Seeding...';
            
            try {
                const ruleData = {
                    id: 'quiz-lead-boost',
                    clinic_id: 'apex',
                    name: 'Quiz Lead Boost - Per Ad Set',
                    is_active: true,
                    trigger_type: 'lead_count',
                    threshold: 1,
                    time_window_hours: 24,
                    scope: 'per_ad_set',
                    action_type: 'increase_budget',
                    percentage_change: 20,
                    max_daily_budget: 150,
                    frequency_limit: 'once_daily',
                    campaign_name_filter: 'Quiz',
                    ad_set_status_filter: 'ACTIVE'
                };

                const { data, error } = await supabaseClient
                    .from('automation_rules')
                    .upsert(ruleData, { onConflict: 'id' })
                    .select();

                if (error) throw error;

                output.textContent = 'Success!\n\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent = 'Error:\n\n' + error.message;
            }
        }
    </script>
</body>
</html>
