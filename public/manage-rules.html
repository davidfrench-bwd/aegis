<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Automation Rules - Aegis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 30px;
            border-bottom: 2px solid #1e2749;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8b92a7;
            font-size: 14px;
        }
        
        .nav {
            margin: 20px 0;
        }
        
        .nav a {
            color: #3b82f6;
            text-decoration: none;
            margin-right: 20px;
        }
        
        .nav a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        
        .clinic-section {
            background: #131937;
            border: 1px solid #1e2749;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .clinic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .clinic-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        
        .rule-card {
            background: #0f1429;
            border: 1px solid #1e2749;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .rule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .rule-name {
            font-weight: 600;
            color: #fff;
        }
        
        .rule-controls {
            display: flex;
            gap: 10px;
        }
        
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #22c55e;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-edit {
            background: #3b82f6;
            color: #fff;
        }
        
        .btn-edit:hover {
            background: #2563eb;
        }
        
        .btn-delete {
            background: #ef4444;
            color: #fff;
        }
        
        .btn-delete:hover {
            background: #dc2626;
        }
        
        .rule-details {
            font-size: 13px;
            color: #8b92a7;
            margin-top: 8px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        
        .modal-content {
            background-color: #131937;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #1e2749;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        
        .close {
            color: #8b92a7;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 5px;
            color: #e0e6ed;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 10px;
            background: #0f1429;
            border: 1px solid #1e2749;
            border-radius: 6px;
            color: #e0e6ed;
            font-size: 14px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn-save {
            background: #22c55e;
            color: #fff;
            padding: 10px 20px;
        }
        
        .btn-save:hover {
            background: #16a34a;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b92a7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Manage Automation Rules</h1>
            <p class="subtitle">Configure NPE ad automation rules</p>
            <div class="nav">
                <a href="/control-panel.html">← Back to Control Panel</a>
                <a href="/">Aegis Home</a>
            </div>
        </header>
        
        <div id="alertContainer"></div>
        
        <div id="rulesContainer">
            <div class="loading">Loading rules...</div>
        </div>
    </div>
    
    <!-- Edit Rule Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Edit Rule</div>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <input type="hidden" id="editRuleId">
            <div class="form-group">
                <label class="form-label">Rule Name</label>
                <input type="text" id="editRuleName" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Threshold</label>
                <input type="number" id="editThreshold" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Percentage Change (%)</label>
                <input type="number" id="editPercentage" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Max Daily Budget ($)</label>
                <input type="number" id="editMaxBudget" class="form-input" step="0.01">
            </div>
            <div class="form-group">
                <label class="form-label">Campaign ID (optional)</label>
                <input type="text" id="editCampaignId" class="form-input" placeholder="Meta Ads Campaign ID" onchange="checkAdSetCount()">
                <small style="color: #8b92a7; font-size: 12px; margin-top: 4px; display: block;">Leave empty to apply to all campaigns, or enter a specific Meta Ads campaign ID</small>
            </div>
            <div id="adSetCountInfo" style="display: none; margin-bottom: 15px; padding: 10px; background: #1e2749; border-radius: 6px;">
                <div style="color: #3b82f6; font-weight: 500; font-size: 14px;">
                    <span id="adSetCountSpinner" style="display: inline-block;">⏳</span>
                    <span id="adSetCountText">Checking ad sets...</span>
                </div>
            </div>
            <button class="btn btn-save" onclick="saveRule()">Save Changes</button>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://fbmsmqukiogxeclmgvim.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXNtcXVraW9neGVjbG1ndmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjQyODAsImV4cCI6MjA4ODE0MDI4MH0.TUmewpYEt_oYsamQpGijPYVSyk_i3gg5uS8LBUwB-0s';
        
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function formatLastRun(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('en-US', {
                timeZone: 'America/New_York',
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
        
        async function loadRules() {
            const { data: rules, error } = await sbClient
                .from('automation_rules')
                .select('*')
                .order('clinic_id');
            
            if (error) {
                showAlert('Failed to load rules: ' + error.message, 'error');
                return;
            }
            
            // Fetch last run times from automation_logs
            const { data: logs } = await sbClient
                .from('automation_logs')
                .select('rule_id, run_at')
                .order('run_at', { ascending: false });
            
            // Map rule_id to last run time
            const lastRunMap = {};
            if (logs) {
                logs.forEach(log => {
                    if (!lastRunMap[log.rule_id]) {
                        lastRunMap[log.rule_id] = log.run_at;
                    }
                });
            }
            
            // Add last run to each rule
            rules.forEach(rule => {
                rule.last_run = lastRunMap[rule.id];
            });
            
            // Group by clinic
            const clinicMap = {};
            rules.forEach(rule => {
                if (!clinicMap[rule.clinic_id]) {
                    clinicMap[rule.clinic_id] = [];
                }
                clinicMap[rule.clinic_id].push(rule);
            });
            
            // Render
            const container = document.getElementById('rulesContainer');
            container.innerHTML = '';
            
            for (const [clinicId, clinicRules] of Object.entries(clinicMap)) {
                const section = document.createElement('div');
                section.className = 'clinic-section';
                
                const clinicName = clinicId.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                
                section.innerHTML = `
                    <div class="clinic-header">
                        <div class="clinic-name">${clinicName}</div>
                        <div>${clinicRules.length} rule(s)</div>
                    </div>
                `;
                
                clinicRules.forEach(rule => {
                    const card = document.createElement('div');
                    card.className = 'rule-card';
                    card.innerHTML = `
                        <div class="rule-header">
                            <div class="rule-name">${rule.name}</div>
                            <div class="rule-controls">
                                <label class="toggle-switch">
                                    <input type="checkbox" ${rule.is_active ? 'checked' : ''} onchange="toggleRule('${rule.id}', ${rule.is_active})">
                                    <span class="slider"></span>
                                </label>
                                <button class="btn btn-edit" onclick='editRule(${JSON.stringify(rule)})'>Edit</button>
                                <button class="btn btn-delete" onclick="deleteRule('${rule.id}', '${rule.name}')">Delete</button>
                            </div>
                        </div>
                        ${rule.description ? `<div style="color: #e0e6ed; margin-bottom: 10px; font-size: 14px;">${rule.description}</div>` : ''}
                        <div class="rule-details">
                            Trigger: ${rule.trigger_type} (threshold: ${rule.threshold}) • 
                            Action: ${rule.action_type} (${rule.percentage_change || 0}%) • 
                            Max budget: $${(rule.max_daily_budget / 100).toFixed(2)}/day
                            ${rule.campaign_id ? ` • <span style="color: #3b82f6;">Campaign: ${rule.campaign_id}</span>` : ''}
                        </div>
                        <div class="rule-details" style="margin-top: 8px; color: #8b92a7;">
                            Last run: ${rule.last_run ? formatLastRun(rule.last_run) : 'Never'}
                        </div>
                    `;
                    section.appendChild(card);
                });
                
                container.appendChild(section);
            }
        }
        
        async function toggleRule(ruleId, currentState) {
            const newState = !currentState;
            
            const { error } = await sbClient
                .from('automation_rules')
                .update({ is_active: newState })
                .eq('id', ruleId);
            
            if (error) {
                showAlert('Failed to toggle rule: ' + error.message, 'error');
                return;
            }
            
            showAlert(`Rule ${newState ? 'enabled' : 'disabled'} successfully`, 'success');
            loadRules();
        }
        

        

        
        async function deleteRule(ruleId, ruleName) {
            if (!confirm(`Delete rule "${ruleName}"? This cannot be undone.`)) {
                return;
            }
            
            const { error } = await sbClient
                .from('automation_rules')
                .delete()
                .eq('id', ruleId);
            
            if (error) {
                showAlert('Failed to delete rule: ' + error.message, 'error');
                return;
            }
            
            showAlert('Rule deleted successfully', 'success');
            loadRules();
        }
        

        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
        
        let checkAdSetTimeout = null;
        let currentRule = null;
        
        function editRule(rule) {
            currentRule = rule; // Store current rule for ad set checking
            document.getElementById('editRuleId').value = rule.id;
            document.getElementById('editRuleName').value = rule.name;
            document.getElementById('editThreshold').value = rule.threshold;
            document.getElementById('editPercentage').value = rule.percentage_change || 0;
            document.getElementById('editMaxBudget').value = (rule.max_daily_budget / 100).toFixed(2);
            document.getElementById('editCampaignId').value = rule.campaign_id || '';
            
            document.getElementById('editModal').style.display = 'block';
            checkAdSetCount(); // Check ad sets when modal opens
        }
        
        async function checkAdSetCount() {
            // Clear existing timeout
            if (checkAdSetTimeout) {
                clearTimeout(checkAdSetTimeout);
            }
            
            // Debounce the check
            checkAdSetTimeout = setTimeout(async () => {
                const campaignId = document.getElementById('editCampaignId').value.trim();
                const adSetCountDiv = document.getElementById('adSetCountInfo');
                const adSetCountText = document.getElementById('adSetCountText');
                const adSetCountSpinner = document.getElementById('adSetCountSpinner');
                
                if (!currentRule) {
                    return;
                }
                
                adSetCountDiv.style.display = 'block';
                adSetCountSpinner.style.display = 'inline-block';
                adSetCountText.textContent = 'Checking Meta Ads for active ad sets...';
                
                try {
                    // Call the API to get actual ad set count from Meta
                    const response = await fetch('/api/meta/count-adsets', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            clinic_id: currentRule.clinic_id,
                            campaign_id: campaignId || null,
                            campaign_name_filter: currentRule.campaign_name_filter || null
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to fetch ad sets');
                    }
                    
                    adSetCountSpinner.style.display = 'none';
                    
                    if (campaignId) {
                        // Specific campaign ID
                        adSetCountText.innerHTML = `✅ This rule will apply to <strong>${data.active_ad_sets}</strong> active ad set(s) in campaign ${campaignId}`;
                    } else if (currentRule.campaign_name_filter) {
                        // Using campaign name filter
                        adSetCountText.innerHTML = `✅ This rule will apply to <strong>${data.active_ad_sets}</strong> active ad set(s) in campaigns containing "<strong>${currentRule.campaign_name_filter}</strong>"`;
                    } else {
                        // No filtering
                        adSetCountText.innerHTML = `⚠️ This rule will apply to <strong>${data.active_ad_sets}</strong> active ad set(s) across ALL campaigns for ${currentRule.clinic_id}`;
                    }
                    
                    // Store the count for the save confirmation
                    adSetCountText.setAttribute('data-count', data.active_ad_sets);
                    
                } catch (error) {
                    adSetCountSpinner.style.display = 'none';
                    adSetCountText.innerHTML = `❌ Error checking Meta Ads: ${error.message}`;
                    console.error('Error checking ad sets:', error);
                }
            }, 500); // 500ms debounce
        }
        
        async function saveRule() {
            // Show ad set count confirmation
            const adSetCountText = document.getElementById('adSetCountText').textContent;
            if (!confirm(`${adSetCountText}\n\nContinue saving?`)) {
                return;
            }
            
            const ruleId = document.getElementById('editRuleId').value;
            const campaignId = document.getElementById('editCampaignId').value.trim();
            
            const updates = {
                name: document.getElementById('editRuleName').value,
                threshold: parseInt(document.getElementById('editThreshold').value),
                percentage_change: parseInt(document.getElementById('editPercentage').value),
                max_daily_budget: Math.round(parseFloat(document.getElementById('editMaxBudget').value) * 100),
                campaign_id: campaignId || null
            };
            
            const { error } = await sbClient
                .from('automation_rules')
                .update(updates)
                .eq('id', ruleId);
            
            if (error) {
                showAlert('Failed to save rule: ' + error.message, 'error');
                return;
            }
            
            closeModal();
            showAlert('Rule updated successfully', 'success');
            loadRules();
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('adSetCountInfo').style.display = 'none';
            currentRule = null;
        }
        
        // Load on page load
        loadRules();
    </script>
</body>
</html>
