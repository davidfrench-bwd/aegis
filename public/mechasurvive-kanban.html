<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaSurvive — Task Board (Real-time)</title>
    <link rel="stylesheet" href="/dashboard/style.css">
    <style>
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .kanban-column {
            background: #1a1f3a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
        }

        .kanban-column > div[id$="-tasks"] {
            min-height: 300px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .kanban-column h3 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }

        .kanban-column.todo h3 {
            color: #ef4444;
            border-color: #ef4444;
        }

        .kanban-column.inprogress h3 {
            color: #f59e0b;
            border-color: #f59e0b;
        }

        .kanban-column.done h3 {
            color: #10b981;
            border-color: #10b981;
        }

        .task-card {
            background: #0a0e27;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: move;
            transition: all 0.2s;
            position: relative;
        }

        .task-card:hover {
            border-color: #00d9ff;
            transform: translateY(-2px);
        }

        .task-card.high-priority {
            border-left: 4px solid #ef4444;
        }

        .task-card.medium-priority {
            border-left: 4px solid #f59e0b;
        }

        .task-card.low-priority {
            border-left: 4px solid #10b981;
        }

        .task-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        .task-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .task-week {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .task-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-card:hover .task-delete {
            opacity: 1;
        }

        .add-task-btn {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px dashed #64748b;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .add-task-btn:hover {
            background: #475569;
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .sync-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }

        .sync-indicator.syncing {
            display: block;
            background: #f59e0b;
        }

        @media (max-width: 768px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
</head>
<body>
    <div class="sync-indicator" id="sync-indicator">🔄 Syncing...</div>
    
    <div class="container">
        <header>
            <h1>🤖 MECHASURVIVE</h1>
            <p class="subtitle">Task Board — Real-time Sync ⚡</p>
            <nav class="main-nav">
                <a href="/mechasurvive.html" class="nav-link">← Back to Mission Control</a>
                <a href="/" class="nav-link">🛡️ Aegis Home</a>
            </nav>
        </header>

        <div class="kanban-board">
            <!-- TO DO Column -->
            <div class="kanban-column todo">
                <h3>📋 TO DO</h3>
                <div id="todo-tasks"></div>
                <button class="add-task-btn" data-column="todo">+ Add Task</button>
            </div>

            <!-- IN PROGRESS Column -->
            <div class="kanban-column inprogress">
                <h3>⚡ IN PROGRESS</h3>
                <div id="inprogress-tasks"></div>
                <button class="add-task-btn" data-column="inprogress">+ Add Task</button>
            </div>

            <!-- DONE Column -->
            <div class="kanban-column done">
                <h3>✅ DONE</h3>
                <div id="done-tasks"></div>
                <button class="add-task-btn" data-column="done">+ Add Task</button>
            </div>
        </div>
    </div>

    <script>
        let draggedElement = null;
        let draggedTaskId = null;
        let supabaseDB = null;
        let realtimeChannel = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize Supabase
            supabaseDB = window.supabaseClient;
            
            // Load initial tasks
            await loadAllTasks();
            
            // Setup real-time subscription
            setupRealtimeSync();
            
            // Attach event listeners
            const addTaskButtons = document.querySelectorAll('.add-task-btn');
            console.log('Found', addTaskButtons.length, 'add task buttons');
            addTaskButtons.forEach(button => {
                button.addEventListener('click', function() {
                    console.log('Add task button clicked, column:', this.getAttribute('data-column'));
                    const column = this.getAttribute('data-column');
                    addTask(column);
                });
            });

            // Setup drag and drop
            initDragAndDrop();
        });

        async function loadAllTasks() {
            try {
                const { data: tasks, error } = await supabaseDB
                    .from('mechasurvive_tasks')
                    .select('*')
                    .order('sort_order', { ascending: true });

                if (error) throw error;

                // Clear all columns
                ['todo', 'inprogress', 'done'].forEach(status => {
                    document.getElementById(`${status}-tasks`).innerHTML = '';
                });

                // Render tasks
                tasks.forEach(task => renderTask(task));
                
                // Re-init drag and drop
                initDragAndDrop();
            } catch (error) {
                console.error('Error loading tasks:', error);
                alert('Failed to load tasks from database');
            }
        }

        function renderTask(task) {
            const container = document.getElementById(`${task.status}-tasks`);
            
            // Check if task already exists
            let taskCard = container.querySelector(`[data-task-id="${task.id}"]`);
            
            if (!taskCard) {
                // Create new task card
                taskCard = document.createElement('div');
                taskCard.className = `task-card ${task.priority}-priority`;
                taskCard.draggable = true;
                taskCard.setAttribute('data-task-id', task.id);
            }

            taskCard.innerHTML = `
                <button class="task-delete" onclick="deleteTask('${task.id}')">✕</button>
                <div class="task-title">${escapeHtml(task.title)}</div>
                <div class="task-meta">
                    <span class="task-week">${escapeHtml(task.week)}</span>
                    <span>Priority: ${task.priority.toUpperCase()}</span>
                </div>
            `;

            container.appendChild(taskCard);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupRealtimeSync() {
            // Subscribe to INSERT, UPDATE, DELETE events
            realtimeChannel = supabaseDB
                .channel('mechasurvive-tasks-changes')
                .on(
                    'postgres_changes',
                    {
                        event: '*',
                        schema: 'public',
                        table: 'mechasurvive_tasks'
                    },
                    (payload) => {
                        console.log('Real-time update:', payload);
                        handleRealtimeUpdate(payload);
                    }
                )
                .subscribe();
        }

        function handleRealtimeUpdate(payload) {
            const { eventType, new: newRecord, old: oldRecord } = payload;

            if (eventType === 'INSERT') {
                renderTask(newRecord);
                initDragAndDrop();
            } else if (eventType === 'UPDATE') {
                // Remove old card
                const oldCard = document.querySelector(`[data-task-id="${newRecord.id}"]`);
                if (oldCard) oldCard.remove();
                
                // Render new
                renderTask(newRecord);
                initDragAndDrop();
            } else if (eventType === 'DELETE') {
                const card = document.querySelector(`[data-task-id="${oldRecord.id}"]`);
                if (card) card.remove();
            }
        }

        function initDragAndDrop() {
            const tasks = document.querySelectorAll('.task-card');
            const columns = document.querySelectorAll('.kanban-column > div[id$="-tasks"]');

            columns.forEach(column => {
                column.removeEventListener('dragover', handleDragOver);
                column.removeEventListener('dragleave', handleDragLeave);
                column.removeEventListener('drop', handleDrop);
                
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('dragleave', handleDragLeave);
                column.addEventListener('drop', handleDrop);
            });

            tasks.forEach(task => {
                task.draggable = true;
                task.removeEventListener('dragstart', handleDragStart);
                task.removeEventListener('dragend', handleDragEnd);
                task.addEventListener('dragstart', handleDragStart);
                task.addEventListener('dragend', handleDragEnd);
            });
        }

        function handleDragStart(e) {
            draggedElement = this;
            draggedTaskId = this.getAttribute('data-task-id');
            this.style.opacity = '0.5';
        }

        async function handleDragEnd(e) {
            this.style.opacity = '1';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.background = 'rgba(0, 217, 255, 0.1)';
            return false;
        }

        function handleDragLeave(e) {
            this.style.background = '';
        }

        async function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            
            this.style.background = '';
            
            if (!draggedElement || !draggedTaskId) return;

            // Determine new status from drop zone id
            const newStatus = this.id.replace('-tasks', '');
            
            // Append to drop zone
            this.appendChild(draggedElement);

            // Update in Supabase
            try {
                showSyncIndicator();
                
                const { error } = await supabaseDB
                    .from('mechasurvive_tasks')
                    .update({ status: newStatus })
                    .eq('id', draggedTaskId);

                if (error) throw error;

                hideSyncIndicator();
            } catch (error) {
                console.error('Error updating task:', error);
                alert('Failed to update task status');
                // Reload to reset state
                await loadAllTasks();
            }

            draggedElement = null;
            draggedTaskId = null;
        }

        async function addTask(status) {
            const title = prompt('Task title:');
            if (!title) return;

            try {
                showSyncIndicator();

                // Get current max sort_order for this status
                const { data: existingTasks } = await supabaseDB
                    .from('mechasurvive_tasks')
                    .select('sort_order')
                    .eq('status', status)
                    .order('sort_order', { ascending: false })
                    .limit(1);
                
                const nextSortOrder = existingTasks && existingTasks.length > 0 
                    ? existingTasks[0].sort_order + 1 
                    : 1;

                const { data, error } = await supabaseDB
                    .from('mechasurvive_tasks')
                    .insert({
                        title,
                        priority: 'medium', // Default to medium
                        week: 'Week 4', // Default to Week 4
                        status,
                        sort_order: nextSortOrder
                    })
                    .select();

                if (error) {
                    console.error('Supabase error details:', JSON.stringify(error, null, 2));
                    throw error;
                }

                console.log('Task added successfully:', data);
                hideSyncIndicator();
            } catch (error) {
                console.error('Error adding task:', error);
                alert('Failed to add task: ' + error.message);
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Delete this task?')) return;

            try {
                showSyncIndicator();

                const { error } = await supabaseDB
                    .from('mechasurvive_tasks')
                    .delete()
                    .eq('id', taskId);

                if (error) throw error;

                hideSyncIndicator();
            } catch (error) {
                console.error('Error deleting task:', error);
                alert('Failed to delete task');
            }
        }

        function showSyncIndicator() {
            const indicator = document.getElementById('sync-indicator');
            indicator.classList.add('syncing');
            indicator.textContent = '🔄 Syncing...';
        }

        function hideSyncIndicator() {
            const indicator = document.getElementById('sync-indicator');
            setTimeout(() => {
                indicator.textContent = '✅ Synced';
                indicator.style.background = '#10b981';
                setTimeout(() => {
                    indicator.classList.remove('syncing');
                }, 1000);
            }, 300);
        }
    </script>
    <script>
        // Require admin authentication
        (async () => {
            const auth = await requireAuth("admin");
            if (!auth) return;
            
            // Add logout button
            const nav = document.querySelector(".main-nav");
            if (nav) {
                const logoutBtn = document.createElement("a");
                logoutBtn.textContent = "🚪 Logout";
                logoutBtn.className = "nav-link";
                logoutBtn.style.background = "#ef4444";
                logoutBtn.style.cursor = "pointer";
                logoutBtn.onclick = async (e) => {
                    e.preventDefault();
                    await signOut();
                    window.location.href = "/login.html";
                };
                nav.appendChild(logoutBtn);
            }
        })();
    </script>
</body>
</html>
