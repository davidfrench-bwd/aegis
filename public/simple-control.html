<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #fff; }
        .rules { margin-top: 20px; }
        .rule {
            background: #131937;
            border: 1px solid #1e2749;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .active { border-left: 4px solid #22c55e; }
        .inactive { border-left: 4px solid #ef4444; }
    </style>
</head>
<body>
    <h1>🛡️ Simple Control Panel</h1>
    <p><a href="/" style="color: #3b82f6;">← Back to Home</a></p>
    
    <div id="status">Loading...</div>
    <div id="rules" class="rules"></div>
    
    <script>
        const sbClient = window.supabase.createClient(
            'https://fbmsmqukiogxeclmgvim.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZibXNtcXVraW9neGVjbG1ndmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjQyODAsImV4cCI6MjA4ODE0MDI4MH0.TUmewpYEt_oYsamQpGijPYVSyk_i3gg5uS8LBUwB-0s'
        );
        
        async function loadRules() {
            console.log('Loading rules...');
            const { data, error } = await sbClient
                .from('automation_rules')
                .select('*')
                .order('clinic_id');
            
            if (error) {
                document.getElementById('status').innerHTML = '❌ Error: ' + error.message;
                console.error(error);
                return;
            }
            
            document.getElementById('status').innerHTML = `✅ Loaded ${data.length} rules`;
            
            const html = data.map(r => `
                <div class="rule ${r.is_active ? 'active' : 'inactive'}">
                    <strong>${r.name}</strong> 
                    <span style="color: ${r.is_active ? '#22c55e' : '#ef4444'}">
                        (${r.is_active ? 'Active' : 'Paused'})
                    </span>
                    <br>
                    <small>${r.clinic_id} • ${r.trigger_type} (${r.threshold}) → ${r.action_type} ${r.percentage_change}%</small>
                </div>
            `).join('');
            
            document.getElementById('rules').innerHTML = html;
        }
        
        loadRules();
    </script>
</body>
</html>
